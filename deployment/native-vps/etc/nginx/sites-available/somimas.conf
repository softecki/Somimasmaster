# /etc/nginx/sites-available/somimas.conf
# Replace APP_DOMAIN with your production hostname before enabling the site.

# Rate-limit zones (shared across server blocks)
limit_req_zone $binary_remote_addr zone=somimas_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=somimas_webhooks:10m rate=10r/s;

upstream fineract_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream control_plane_backend {
    server 127.0.0.1:8090;
    keepalive 16;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name APP_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name APP_DOMAIN;

    # Certbot will populate these paths on first run:
    ssl_certificate     /etc/letsencrypt/live/APP_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/APP_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 25m;

    root /var/www/somimas/current;
    index index.html;

    access_log /var/log/nginx/somimas-access.log;
    error_log  /var/log/nginx/somimas-error.log warn;

    # Internal provisioning APIs are reachable only over loopback by the
    # control-plane service and must never be exposed through the public edge.
    location ^~ /fineract-provider/internal/ {
        return 404;
    }

    # --- Fineract API (plain HTTP upstream; TLS at edge) ---
    location /fineract-provider/ {
        limit_req zone=somimas_api burst=60 nodelay;

        proxy_pass http://fineract_backend/fineract-provider/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # --- SaaS Control Plane API ---
    location /saas-api/ {
        limit_req zone=somimas_api burst=40 nodelay;

        proxy_pass http://control_plane_backend/saas-api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }

    # Payment webhooks (tighter rate limit, no auth at edge)
    location /saas-api/webhooks/ {
        limit_req zone=somimas_webhooks burst=20 nodelay;

        proxy_pass http://control_plane_backend/saas-api/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Angular SPA (hash routing) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /assets/env.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
