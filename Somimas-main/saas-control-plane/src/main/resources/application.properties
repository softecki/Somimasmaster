server.port=8090
server.address=127.0.0.1
server.servlet.context-path=/saas-api

spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/somimas_control
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

somimas.fineract.bridge-url=http://127.0.0.1:8080/fineract-provider
somimas.fineract.bridge-token=

somimas.auth.mode=local
somimas.auth.jwt-secret=${SOMIMAS_AUTH_JWT_SECRET:}
somimas.auth.platform-admin-emails=${SOMIMAS_AUTH_PLATFORM_ADMIN_EMAILS:}

somimas.flutterwave.secret-hash=
somimas.flutterwave.public-key=
somimas.flutterwave.secret-key=

somimas.trial.days=14

management.endpoints.web.exposure.include=health,info
